# Aggressive PID Parameters for Balance Controller
# Use this when you need faster response (may cause oscillations)
balance_controller:
  ros__parameters:
    # More aggressive PID gains for roll control
    kp_roll: 0.25
    ki_roll: 0.02
    kd_roll: 0.08
    
    # More aggressive PID gains for pitch control
    kp_pitch: 0.25
    ki_pitch: 0.02
    kd_pitch: 0.08
    
    # Height control (can stay the same)
    kp_height: 1.0
    ki_height: 0.1
    kd_height: 0.2
    
    # Target height (meters)
    target_height: 0.25
    
    # Slightly higher limits for aggressive control
    max_roll_correction: 0.12
    max_pitch_correction: 0.12
    max_height_correction: 0.05
    
    # Anti-windup limits
    max_integral_roll: 0.8
    max_integral_pitch: 0.8
    max_integral_height: 0.2
    
    # Rate limiting (higher for faster response)
    max_correction_rate: 0.8
    
    # Control loop rate (Hz)
    control_rate: 100.0
